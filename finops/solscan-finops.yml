specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Solscan
providerId: solscan
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - Solana
  - Explorer
  - FinOps
  - FOCUS
description: >-
  FinOps view of Solscan. Subscription tiers gate a monthly compute-unit (CU) allowance plus a
  per-second rate cap. Per-call CU cost varies by endpoint. Allocation is by API key.
sources:
  - https://solscan.io/apis
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Solscan
serviceCategory: Crypto Explorer
billingModel:
  pricingCategory: Subscription with Metered CU Allowance
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Subscription
    - Usage
focusColumns:
  ServiceName: Solscan Pro API
  ServiceCategory: Crypto Explorer
  ProviderName: Solscan
  PublisherName: Solscan
  InvoiceIssuerName: Solscan
  BillingCurrency: USD
  ChargeCategory: Subscription
meters:
  - name: subscription
    description: Monthly Pro subscription per API key.
    unit: month
    aggregation: sum
    dimensions:
      - api_key
  - name: compute_units
    description: Per-call compute unit consumption against monthly allowance.
    unit: cu
    aggregation: sum
    dimensions:
      - api_key
      - endpoint
principles:
  - name: Visibility
    description: Track per-endpoint CU consumption to forecast tier sufficiency.
  - name: Allocation
    description: Tag each API key to a single owning workload.
  - name: Optimization
    description: Cache hot endpoints; bundle queries to reduce CU consumption.
  - name: Accountability
    description: Assign a billing owner per API key; review monthly CU vs allowance.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
