specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Solscan
providerId: solscan
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
  - Solana
  - Explorer
  - Plans
description: >-
  Solscan publishes a Free Public API and tiered Pro API plans (Hobby, Standard, Business,
  Enterprise) keyed to monthly compute-units (CU) and rate limits. Pricing pages were not
  accessible during this run; figures are best-effort.
notes: Pricing partially reconciled - solscan.io/apis returned 403 during research.
sources:
  - https://solscan.io/apis
  - https://docs.solscan.io/
plans:
  - id: solscan-public
    name: Public (Free)
    type: freemium
    description: Free public API with basic endpoints and limited rate.
    entries:
      - label: Monthly subscription
        name: public_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Basic endpoints
      - name: Lower rate
  - id: solscan-pro-hobby
    name: Pro Hobby
    type: subscription
    description: Entry Pro tier - typically ~$199/month.
    entries:
      - label: Monthly subscription
        name: hobby_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '199.00'
        userMultiplied: false
    elements:
      - name: Pro endpoints
      - name: Modest CU allowance
  - id: solscan-pro-standard
    name: Pro Standard
    type: subscription
    description: Mid Pro tier - typically ~$499/month.
    entries:
      - label: Monthly subscription
        name: standard_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '499.00'
        userMultiplied: false
    elements:
      - name: Higher CU allowance
  - id: solscan-pro-business
    name: Pro Business
    type: subscription
    description: Higher Pro tier - typically ~$999/month.
    entries:
      - label: Monthly subscription
        name: business_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '999.00'
        userMultiplied: false
    elements:
      - name: All Pro endpoints
      - name: Higher rate cap
  - id: solscan-enterprise
    name: Enterprise
    type: enterprise
    description: Custom enterprise contracts with redistribution rights and dedicated support.
    entries:
      - label: Custom pricing
        name: enterprise_custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: contract
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Custom CU allowance
      - name: Dedicated SLA
